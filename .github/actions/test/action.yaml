name: test
description: Common tests for mobile repo

runs:
  using: composite
  steps:
    - name: ci/prepare-node-deps
      uses: ./.github/actions/prepare-node-deps

    - name: ci/check-styles
      shell: bash
      run: |
        echo "::group::check-styles"
        npm run check
        echo "::endgroup::"

    - name: ci/run-tests
      # main and PR will run test:coverage
      if: startsWith(github.ref_name, 'release-')
      shell: bash
      run: |
        echo "::group::run-tests"
        failures=0
        for i in 1 2 3; do
          echo "=== Test run $i of 3 ==="
          if npm run test:ci; then
            echo "Run $i: PASSED"
          else
            echo "Run $i: FAILED"
            failures=$((failures + 1))
          fi
        done
        echo "=== Results: $((3 - failures))/3 passed, $failures failed ==="
        if [ $failures -gt 0 ]; then
          echo "::warning::$failures of 3 test runs failed — flaky tests detected"
          exit 1
        fi
        echo "::endgroup::"

    - name: ci/check-i18n
      shell: bash
      run: |
        echo "::group::check-i18n"
        ./scripts/precommit/i18n.sh
        echo "::endgroup::"
