# E2E tests are triggered exclusively by Matterwick via workflow_dispatch.
# Matterwick provisions dedicated cloud servers and passes their URLs here.
# No static/permanent server fallback is used — if Matterwick doesn't dispatch
# this workflow, no E2E tests run.
name: E2E

on:
  workflow_dispatch:
    inputs:
      MOBILE_VERSION:
        description: "The mobile app commit SHA to test"
        required: true
        type: string
      PLATFORM:
        description: "Mobile platform to test: ios, android, or both"
        required: false
        default: "both"
        type: choice
        options:
          - ios
          - android
          - both
      SITE_1_URL:
        description: "URL of the first Mattermost test server (provisioned by Matterwick)"
        required: true
        type: string
      SITE_2_URL:
        description: "URL of the second Mattermost test server (provisioned by Matterwick)"
        required: false
        type: string
      SITE_3_URL:
        description: "URL of the third Mattermost test server (provisioned by Matterwick)"
        required: false
        type: string
      pr_number:
        description: "PR number to remove E2E label from after tests complete"
        required: false
        type: string
      run_type:
        description: "Run type for test reporting (PR/RELEASE/NIGHTLY). Defaults to PR."
        required: false
        default: "PR"
        type: string

concurrency:
  # Key on pr_number (or run_id for non-PR runs like nightly/push) so
  # simultaneous dispatches for different PRs don't cancel each other.
  group: "${{ github.workflow }}-${{ inputs.pr_number || github.run_id }}"
  cancel-in-progress: true

env:
  INTUNE_ENABLED: 'true'
  DETOX_AWS_S3_BUCKET: "mattermost-detox-report"

jobs:
  update-initial-status-ios:
    if: inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both'
    runs-on: ubuntu-22.04
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/detox-ios-tests
          description: Detox iOS tests for mattermost mobile app have started ...
          status: pending

  update-initial-status-android:
    if: inputs.PLATFORM == 'android' || inputs.PLATFORM == 'both'
    runs-on: ubuntu-22.04
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/detox-android-tests
          description: Detox Android tests for mattermost mobile app have started ...
          status: pending

  update-initial-status-ipad:
    if: inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both'
    runs-on: ubuntu-22.04
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/detox-ipad-tests
          description: Detox iPad tests for mattermost mobile app have started ...
          status: pending

  update-initial-status-maestro-ios:
    if: inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both'
    runs-on: ubuntu-22.04
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/maestro-ios-tests
          description: Maestro iOS tests for mattermost mobile app have started ...
          status: pending

  update-initial-status-maestro-android:
    if: inputs.PLATFORM == 'android' || inputs.PLATFORM == 'both'
    runs-on: ubuntu-22.04
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/maestro-android-tests
          description: Maestro Android tests for mattermost mobile app have started ...
          status: pending

  build-ios-simulator:
    if: inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both'
    runs-on: macos-26
    needs:
      - update-initial-status-ios
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.MOBILE_VERSION }}

      - name: Prepare iOS Build
        uses: ./.github/actions/prepare-ios-build
        with:
          intune-enabled: ${{ env.INTUNE_ENABLED }}
          intune-ssh-private-key: ${{ secrets.MM_MOBILE_INTUNE_DEPLOY_KEY }}

      - name: Set .env with RUNNING_E2E=true
        run: echo "RUNNING_E2E=true" > .env

      - name: Build iOS Simulator
        env:
          TAG: ${{ inputs.MOBILE_VERSION }}
          GITHUB_TOKEN: ${{ secrets.MM_MOBILE_GITHUB_TOKEN }}
        run: bundle exec fastlane ios simulator --env ios.simulator skip_upload_to_s3_bucket:true
        working-directory: ./fastlane

      - name: Upload iOS Simulator Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ios-build-simulator-${{ github.run_id }}
          path: Mattermost-simulator-*.app.zip

  build-android-apk:
    if: inputs.PLATFORM == 'android' || inputs.PLATFORM == 'both'
    runs-on: ubuntu-latest-8-cores
    needs:
      - update-initial-status-android
    env:
      ORG_GRADLE_PROJECT_jvmargs: -Xmx8g
    steps:
      - name: Prune Docker to free up space
        run: docker system prune -af

      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.MOBILE_VERSION }}

      - name: Prepare Android Build
        uses: ./.github/actions/prepare-android-build
        env:
          STORE_FILE: ${{ secrets.MM_MOBILE_STORE_FILE }}
          STORE_ALIAS: ${{ secrets.MM_MOBILE_STORE_ALIAS }}
          STORE_PASSWORD: ${{ secrets.MM_MOBILE_STORE_PASSWORD }}
          MATTERMOST_BUILD_GH_TOKEN: ${{ secrets.MATTERMOST_BUILD_GH_TOKEN }}

      - name: Detox build
        run: |
          cd detox
          npm ci --prefer-offline --no-audit --no-fund
          npm install -g detox-cli
          npm run e2e:android-inject-settings
          npm run e2e:android-build

      - name: Upload Android Build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-build-files-${{ github.run_id }}
          path: "android/app/build/**/*"

  provision-servers:
    name: Provision test servers
    runs-on: ubuntu-22.04
    steps:
      - name: Validate server URLs
        run: |
          validate_url() {
            local url="$1" label="$2"
            if [ -z "$url" ]; then return 0; fi

            # Must be HTTPS
            if [[ ! "$url" =~ ^https:// ]]; then
              echo "::error::$label must use HTTPS: $url"
              exit 1
            fi

            # Extract hostname and validate against allowed domains
            hostname=$(echo "$url" | sed -E 's|^https://([^/:]+).*|\1|' | tr '[:upper:]' '[:lower:]')

            # Block private/internal IPs
            if echo "$hostname" | grep -qE '^(127\.|10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|0\.|localhost)'; then
              echo "::error::$label points to a private/internal address: $hostname"
              exit 1
            fi

            # Allowlist: only Mattermost-operated domains
            if ! echo "$hostname" | grep -qE '\.(cloud\.mattermost\.com|test\.mattermost\.cloud|mattermost\.com|mattermost\.cloud)$'; then
              echo "::error::$label domain not in allowlist: $hostname"
              exit 1
            fi

            echo "✓ $label validated: $hostname"
          }

          validate_url "$SITE_1_URL" "SITE_1_URL"
          validate_url "$SITE_2_URL" "SITE_2_URL"
          validate_url "$SITE_3_URL" "SITE_3_URL"
        env:
          SITE_1_URL: ${{ inputs.SITE_1_URL }}
          SITE_2_URL: ${{ inputs.SITE_2_URL }}
          SITE_3_URL: ${{ inputs.SITE_3_URL }}

      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.MOBILE_VERSION }}

      - name: Provision servers (license + plugins)
        run: |
          for url in $SITE_1_URL $SITE_2_URL $SITE_3_URL; do
            if [ -n "$url" ]; then
              echo "--- Provisioning $url ---"
              node detox/provision_server.js "$url" || echo "Warning: provisioning $url failed (non-fatal)"
            fi
          done
        env:
          SITE_1_URL: ${{ inputs.SITE_1_URL }}
          SITE_2_URL: ${{ inputs.SITE_2_URL }}
          SITE_3_URL: ${{ inputs.SITE_3_URL }}
          ADMIN_USERNAME: ${{ secrets.MM_MOBILE_E2E_ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.MM_MOBILE_E2E_ADMIN_PASSWORD }}

  run-ios-tests:
    if: inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both'
    name: iOS
    needs:
      - build-ios-simulator
      - provision-servers
    uses: ./.github/workflows/e2e-ios-template.yml
    with:
      run-type: ${{ inputs.run_type || 'PR' }}
      MOBILE_VERSION: ${{ inputs.MOBILE_VERSION }}
      MM_TEST_SERVER_URL: ${{ inputs.SITE_1_URL }}
      MM_TEST_SERVER_URL_2: ${{ inputs.SITE_2_URL }}
      MM_TEST_SERVER_URL_3: ${{ inputs.SITE_3_URL }}
    secrets: inherit

  run-android-tests:
    if: inputs.PLATFORM == 'android' || inputs.PLATFORM == 'both'
    name: Android
    needs:
      - build-android-apk
      - provision-servers
    uses: ./.github/workflows/e2e-android-template.yml
    with:
      run-android-tests: true
      run-type: ${{ inputs.run_type || 'PR' }}
      MOBILE_VERSION: ${{ inputs.MOBILE_VERSION }}
      MM_TEST_SERVER_URL: ${{ inputs.SITE_1_URL }}
      MM_TEST_SERVER_URL_2: ${{ inputs.SITE_2_URL }}
      MM_TEST_SERVER_URL_3: ${{ inputs.SITE_3_URL }}
    secrets: inherit

  update-final-status-ios:
    runs-on: ubuntu-22.04
    if: always() && (inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both')
    needs:
      - run-ios-tests
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/detox-ios-tests
          description: Completed with ${{ needs.run-ios-tests.outputs.FAILURES }} failures
          status: ${{ needs.run-ios-tests.outputs.STATUS }}
          target_url: ${{ needs.run-ios-tests.outputs.TARGET_URL }}

  update-final-status-android:
    runs-on: ubuntu-22.04
    if: always() && (inputs.PLATFORM == 'android' || inputs.PLATFORM == 'both')
    needs:
      - run-android-tests
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/detox-android-tests
          description: Completed with ${{ needs.run-android-tests.outputs.FAILURES }} failures
          status: ${{ needs.run-android-tests.outputs.STATUS }}
          target_url: ${{ needs.run-android-tests.outputs.TARGET_URL }}

  run-ios-ipad-tests:
    if: inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both'
    name: iOS iPad
    needs:
      - build-ios-simulator
      - update-initial-status-ipad
      - provision-servers
    uses: ./.github/workflows/e2e-ios-template.yml
    with:
      run-type: ${{ inputs.run_type || 'PR' }}
      MOBILE_VERSION: ${{ inputs.MOBILE_VERSION }}
      MM_TEST_SERVER_URL: ${{ inputs.SITE_2_URL }}
      ios_device_name: "iPad Pro 13-inch (M5)"
      ios_device_os_name: "iOS 26.2"
      search_path: "detox/e2e/test/products/channels/ipad"
      parallelism: "4"
      detox_config: "ios.ipad.debug"
    secrets: inherit

  run-maestro-ios-on-pr:
    if: inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both'
    name: Maestro iOS
    uses: ./.github/workflows/e2e-maestro-template.yml
    needs:
      - build-ios-simulator
      - update-initial-status-maestro-ios
      - provision-servers
    with:
      platform: ios
      run-type: ${{ inputs.run_type || 'PR' }}
      MOBILE_VERSION: ${{ inputs.MOBILE_VERSION }}
      MM_TEST_SERVER_URL: ${{ inputs.SITE_2_URL }}
    secrets: inherit

  run-maestro-android-on-pr:
    if: inputs.PLATFORM == 'android' || inputs.PLATFORM == 'both'
    name: Maestro Android
    uses: ./.github/workflows/e2e-maestro-template.yml
    needs:
      - build-android-apk
      - update-initial-status-maestro-android
      - provision-servers
    with:
      platform: android
      run-type: ${{ inputs.run_type || 'PR' }}
      MOBILE_VERSION: ${{ inputs.MOBILE_VERSION }}
      MM_TEST_SERVER_URL: ${{ inputs.SITE_3_URL }}
    secrets: inherit

  update-final-status-ipad:
    runs-on: ubuntu-22.04
    if: always() && (inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both')
    needs:
      - run-ios-ipad-tests
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/detox-ipad-tests
          description: Completed with ${{ needs.run-ios-ipad-tests.outputs.FAILURES }} failures
          status: ${{ needs.run-ios-ipad-tests.outputs.STATUS }}
          target_url: ${{ needs.run-ios-ipad-tests.outputs.TARGET_URL }}

  update-final-status-maestro-ios:
    runs-on: ubuntu-22.04
    if: always() && (inputs.PLATFORM == 'ios' || inputs.PLATFORM == 'both')
    needs:
      - run-maestro-ios-on-pr
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/maestro-ios-tests
          description: Completed with ${{ needs.run-maestro-ios-on-pr.outputs.FAILURES || '?' }} failures
          status: ${{ needs.run-maestro-ios-on-pr.outputs.STATUS || (needs.run-maestro-ios-on-pr.result == 'success' && 'success' || 'failure') }}
          target_url: ${{ needs.run-maestro-ios-on-pr.outputs.TARGET_URL }}

  update-final-status-maestro-android:
    runs-on: ubuntu-22.04
    if: always() && (inputs.PLATFORM == 'android' || inputs.PLATFORM == 'both')
    needs:
      - run-maestro-android-on-pr
    steps:
      - uses: mattermost/actions/delivery/update-commit-status@main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          repository_full_name: ${{ github.repository }}
          commit_sha: ${{ inputs.MOBILE_VERSION }}
          context: e2e/maestro-android-tests
          description: Completed with ${{ needs.run-maestro-android-on-pr.outputs.FAILURES || '?' }} failures
          status: ${{ needs.run-maestro-android-on-pr.outputs.STATUS || (needs.run-maestro-android-on-pr.result == 'success' && 'success' || 'failure') }}
          target_url: ${{ needs.run-maestro-android-on-pr.outputs.TARGET_URL }}

  unified-report:
    name: Unified E2E Report
    runs-on: ubuntu-22.04
    if: always()
    needs:
      - run-ios-tests
      - run-android-tests
      - run-ios-ipad-tests
      - run-maestro-ios-on-pr
      - run-maestro-android-on-pr
    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.MOBILE_VERSION }}

      - name: ci/prepare-node-deps
        uses: ./.github/actions/prepare-node-deps

      - name: Build platform data JSON
        id: platform-data
        run: |
          build_entry() {
            local name="$1" status="$2" failures="$3" passes="$4" total="$5" skipped="$6" errors="$7" pct="$8" url="$9"
            if [[ -z "$total" || "$total" == "" || "$status" == "" ]]; then
              echo "{\"name\":\"$name\",\"status\":\"not_run\"}"
            else
              echo "{\"name\":\"$name\",\"status\":\"$status\",\"tests\":$total,\"passes\":$passes,\"failures\":$failures,\"skipped\":${skipped:-0},\"errors\":${errors:-0},\"reportUrl\":\"$url\"}"
            fi
          }

          IOS=$(build_entry "Detox iOS" \
            "${{ needs.run-ios-tests.outputs.STATUS }}" \
            "${{ needs.run-ios-tests.outputs.FAILURES }}" \
            "${{ needs.run-ios-tests.outputs.PASSES }}" \
            "${{ needs.run-ios-tests.outputs.TOTAL }}" \
            "${{ needs.run-ios-tests.outputs.SKIPPED }}" \
            "${{ needs.run-ios-tests.outputs.ERRORS }}" \
            "${{ needs.run-ios-tests.outputs.PERCENTAGE }}" \
            "${{ needs.run-ios-tests.outputs.TARGET_URL }}")

          ANDROID=$(build_entry "Detox Android" \
            "${{ needs.run-android-tests.outputs.STATUS }}" \
            "${{ needs.run-android-tests.outputs.FAILURES }}" \
            "${{ needs.run-android-tests.outputs.PASSES }}" \
            "${{ needs.run-android-tests.outputs.TOTAL }}" \
            "${{ needs.run-android-tests.outputs.SKIPPED }}" \
            "${{ needs.run-android-tests.outputs.ERRORS }}" \
            "${{ needs.run-android-tests.outputs.PERCENTAGE }}" \
            "${{ needs.run-android-tests.outputs.TARGET_URL }}")

          IPAD=$(build_entry "Detox iPad" \
            "${{ needs.run-ios-ipad-tests.outputs.STATUS }}" \
            "${{ needs.run-ios-ipad-tests.outputs.FAILURES }}" \
            "${{ needs.run-ios-ipad-tests.outputs.PASSES }}" \
            "${{ needs.run-ios-ipad-tests.outputs.TOTAL }}" \
            "${{ needs.run-ios-ipad-tests.outputs.SKIPPED }}" \
            "${{ needs.run-ios-ipad-tests.outputs.ERRORS }}" \
            "${{ needs.run-ios-ipad-tests.outputs.PERCENTAGE }}" \
            "${{ needs.run-ios-ipad-tests.outputs.TARGET_URL }}")

          MAESTRO_IOS=$(build_entry "Maestro iOS" \
            "${{ needs.run-maestro-ios-on-pr.outputs.STATUS }}" \
            "${{ needs.run-maestro-ios-on-pr.outputs.FAILURES }}" \
            "${{ needs.run-maestro-ios-on-pr.outputs.PASSES }}" \
            "${{ needs.run-maestro-ios-on-pr.outputs.TOTAL }}" \
            "0" "0" \
            "${{ needs.run-maestro-ios-on-pr.outputs.PERCENTAGE }}" \
            "${{ needs.run-maestro-ios-on-pr.outputs.TARGET_URL }}")

          MAESTRO_ANDROID=$(build_entry "Maestro Android" \
            "${{ needs.run-maestro-android-on-pr.outputs.STATUS }}" \
            "${{ needs.run-maestro-android-on-pr.outputs.FAILURES }}" \
            "${{ needs.run-maestro-android-on-pr.outputs.PASSES }}" \
            "${{ needs.run-maestro-android-on-pr.outputs.TOTAL }}" \
            "0" "0" \
            "${{ needs.run-maestro-android-on-pr.outputs.PERCENTAGE }}" \
            "${{ needs.run-maestro-android-on-pr.outputs.TARGET_URL }}")

          PLATFORM_DATA="[$IOS,$ANDROID,$IPAD,$MAESTRO_IOS,$MAESTRO_ANDROID]"
          echo "PLATFORM_DATA=$PLATFORM_DATA" >> "$GITHUB_ENV"

      - name: Generate unified HTML report
        run: |
          cd detox
          npm ci --prefer-offline --no-audit --no-fund
          node generate_unified_report.js
        env:
          PLATFORM_DATA: ${{ env.PLATFORM_DATA }}
          OUTPUT_DIR: unified-report

      - name: Upload unified report to S3
        run: |
          cd detox
          node -e "
            const {S3} = require('@aws-sdk/client-s3');
            const {Upload} = require('@aws-sdk/lib-storage');
            const fs = require('fs');
            const s3 = new S3({credentials: {accessKeyId: process.env.AWS_KEY, secretAccessKey: process.env.AWS_SECRET}});
            const file = 'unified-report/unified-report.html';
            new Upload({client: s3, params: {
              Key: process.env.REPORT_PATH + '/unified-report.html',
              Bucket: process.env.AWS_BUCKET,
              Body: fs.readFileSync(file),
              ContentType: 'text/html; charset=utf-8',
            }}).done().then(() => console.log('Uploaded unified report to S3'));
          "
        env:
          AWS_KEY: ${{ secrets.MM_MOBILE_DETOX_AWS_ACCESS_KEY_ID }}
          AWS_SECRET: ${{ secrets.MM_MOBILE_DETOX_AWS_SECRET_ACCESS_KEY }}
          AWS_BUCKET: ${{ env.DETOX_AWS_S3_BUCKET }}
          REPORT_PATH: unified-${{ github.run_id }}

      - name: Post or update unified PR comment
        if: inputs.pr_number != ''
        uses: actions/github-script@e7aeb8c663f696059ebb5f9ab1425ed2ef511bdb # v7.0.1
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);
            if (!prNumber) return;

            const platforms = JSON.parse(process.env.PLATFORM_DATA);
            const unifiedUrl = `https://${process.env.S3_BUCKET}.s3.amazonaws.com/unified-${context.runId}/unified-report.html`;

            const rows = platforms.map(p => {
              if (p.status === 'not_run') {
                return `| ${p.name} | - | - | - | - | ⏸️ NOT RUN |`;
              }
              const pct = p.tests > 0 ? ((p.passes / p.tests) * 100).toFixed(1) : '0.0';
              const icon = p.failures > 0 ? '❌' : '✅';
              const link = p.reportUrl ? `[${pct}%](${p.reportUrl})` : `${pct}%`;
              return `| ${p.name} | ${p.tests} | ${p.passes} | ${p.failures} | ${p.skipped || 0} | ${icon} ${link} |`;
            }).join('\n');

            const ran = platforms.filter(p => p.status !== 'not_run');
            const totalTests = ran.reduce((s, p) => s + (p.tests || 0), 0);
            const totalPasses = ran.reduce((s, p) => s + (p.passes || 0), 0);
            const totalFailures = ran.reduce((s, p) => s + (p.failures || 0), 0);
            const totalSkipped = ran.reduce((s, p) => s + (p.skipped || 0), 0);
            const overallPct = totalTests > 0 ? ((totalPasses / totalTests) * 100).toFixed(1) : '0.0';

            const body = `## 📊 E2E Test Report — ${process.env.MOBILE_SHA?.substring(0, 8)}

            | Platform | Tests | Passed | Failed | Skipped | Result |
            |:---------|:-----:|:------:|:------:|:-------:|:------:|
            ${rows}
            | **Total** | **${totalTests}** | **${totalPasses}** | **${totalFailures}** | **${totalSkipped}** | **${overallPct}%** |

            [View full unified report](${unifiedUrl})

            🤖 Generated by E2E CI`;

            const COMMENT_MARKER = '## 📊 E2E Test Report';
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body && c.body.startsWith(COMMENT_MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          PLATFORM_DATA: ${{ env.PLATFORM_DATA }}
          MOBILE_SHA: ${{ inputs.MOBILE_VERSION }}
          S3_BUCKET: ${{ env.DETOX_AWS_S3_BUCKET }}

      - name: Send unified webhook
        if: inputs.run_type != '' && inputs.run_type != 'NONE'
        run: |
          cd detox
          node -e "
            const axios = require('axios');
            const platforms = JSON.parse(process.env.PLATFORM_DATA);
            const ran = platforms.filter(p => p.status !== 'not_run');
            const totalTests = ran.reduce((s, p) => s + (p.tests || 0), 0);
            const totalPasses = ran.reduce((s, p) => s + (p.passes || 0), 0);
            const totalFailures = ran.reduce((s, p) => s + (p.failures || 0), 0);
            const overallPct = totalTests > 0 ? ((totalPasses / totalTests) * 100).toFixed(2) : '0.00';
            const unifiedUrl = 'https://' + process.env.S3_BUCKET + '.s3.amazonaws.com/unified-' + process.env.RUN_ID + '/unified-report.html';

            const lines = platforms.map(p => {
              if (p.status === 'not_run') return '- ' + p.name + ': ⏸️ NOT RUN';
              const pct = p.tests > 0 ? ((p.passes / p.tests) * 100).toFixed(1) : '0.0';
              const icon = p.failures > 0 ? ':x:' : ':white_check_mark:';
              return '- ' + p.name + ': ' + icon + ' ' + pct + '% (' + p.passes + '/' + p.tests + ')';
            }).join('\n');

            const color = overallPct >= 100 ? '#43A047' : overallPct >= 98 ? '#FFEB3B' : overallPct >= 95 ? '#FF9800' : '#F44336';

            const data = {
              username: 'Mobile E2E Tests',
              icon_url: 'https://mattermost.com/wp-content/uploads/2022/02/icon_WS.png',
              attachments: [{
                color,
                author_name: 'Unified E2E Report',
                title: 'Mobile E2E — ' + overallPct + '% (' + totalPasses + '/' + totalTests + ') | ' + totalFailures + ' failures',
                text: lines + '\n\n[View full report](' + unifiedUrl + ')',
              }],
            };

            if (process.env.WEBHOOK_URL) {
              axios.post(process.env.WEBHOOK_URL, data).then(() => console.log('Webhook sent')).catch(e => console.log('Webhook failed:', e.message));
            } else {
              console.log('No WEBHOOK_URL set, skipping');
            }
          "
        env:
          PLATFORM_DATA: ${{ env.PLATFORM_DATA }}
          RUN_ID: ${{ github.run_id }}
          S3_BUCKET: ${{ env.DETOX_AWS_S3_BUCKET }}
          WEBHOOK_URL: ${{ secrets.MM_MOBILE_E2E_WEBHOOK_URL }}

  e2e-remove-matterwick-label:
    name: Remove Matterwick E2E label from PR
    runs-on: ubuntu-22.04
    needs:
      - unified-report
    # IMPORTANT: !cancelled() prevents label removal when the workflow is cancelled
    # (e.g. by concurrency cancel-in-progress). Without this, Matterwick sees the
    # label removed and deletes the test servers while the replacement run is still
    # using them.
    if: always() && !cancelled() && inputs.pr_number != ''
    steps:
      - name: e2e/remove-label-from-pr
        uses: actions/github-script@e7aeb8c663f696059ebb5f9ab1425ed2ef511bdb # v7.0.1
        continue-on-error: true # Label might have been removed manually
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER);
            if (!prNumber) return;
            const labels = ['E2E/Run', 'E2E/Run-iOS', 'E2E/Run-Android'];
            for (const label of labels) {
              try {
                await github.rest.issues.removeLabel({
                  issue_number: prNumber,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                });
              } catch (_) {
                // Label may not exist on this PR, ignore
              }
            }
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
