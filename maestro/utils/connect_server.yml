# Sub-flow: Connect to Mattermost server (server form step only).
# Called by login.yml when the server form is visible (no server registered yet).
# Usage: - runFlow: ../utils/connect_server.yml
# Requires: SITE_1_URL env var
appId: ${MAESTRO_APP_ID}
---
- tapOn:
    id: "server_form.server_url.input"
- eraseText: 50
- inputText: ${SITE_1_URL}
- tapOn:
    id: "server_form.server_display_name.input"
- eraseText: 50
- inputText: "Server 1"
- tapOn:
    id: "server_form.connect.button"
# App-level "Notifications cannot be received" alert (non-blocking info).
# Dismiss if present; safe to skip if absent.
- tapOn:
    text: "Okay"
    optional: true
- tapOn:
    text: "OKAY"
    optional: true
