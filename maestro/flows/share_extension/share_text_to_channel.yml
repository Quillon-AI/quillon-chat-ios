# MM-T2863: Share text to a Mattermost channel via the share extension
tags:
  - MM-T2863
appId: com.mattermost.rnbeta
---
- runFlow: ../../utils/login.yml
- runFlow: ../../utils/navigate_to_channel.yml

# --- iOS: use Safari ---
- runFlow:
    when:
      platform: iOS
    commands:
      - launchApp:
          appId: "com.apple.mobilesafari"
      - extendedWaitUntil:
          visible:
            id: "TabBarItemTitle"
          timeout: 15000
      - tapOn:
          id: "TabBarItemTitle"
      - inputText: "https://wikipedia.org"
      - pressKey: Enter
      - extendedWaitUntil:
          visible:
            text: "Wikipedia"
          timeout: 30000
      - tapOn:
          text: "Continue"
          optional: true
      # iOS 26 Safari: share is under the "..." (More) overflow button
      - tapOn:
          text: "More"
      - tapOn:
          text: "Share"
      # NOTE: In iOS 26 the "Mattermost Beta" shareCell in the app icons row is
      # "Open In Mattermost" (not the share extension). The extension must be
      # enabled via "View More" in the Safari share sheet settings (one-time setup).
      - extendedWaitUntil:
          visible:
            id: "share_extension.channel.option"
          timeout: 20000

# --- Android: use Chrome ---
- runFlow:
    when:
      platform: Android
    commands:
      - stopApp:
          appId: "com.android.chrome"
      - launchApp:
          appId: "com.android.chrome"
      - tapOn:
          text: "Use without an account"
          optional: true
      - tapOn:
          text: "No thanks"
          optional: true
      - tapOn:
          id: "com.android.chrome:id/search_box_text"
          optional: true
      - tapOn:
          id: "com.android.chrome:id/url_bar"
          optional: true
      - inputText: "https://wikipedia.org"
      - pressKey: Enter
      - extendedWaitUntil:
          visible:
            text: "Wikipedia"
          timeout: 30000
      - tapOn:
          id: "com.android.chrome:id/menu_button"
      - extendedWaitUntil:
          visible:
            id: "com.android.chrome:id/share_menu_id"
          timeout: 5000
      - tapOn:
          id: "com.android.chrome:id/share_menu_id"
      - extendedWaitUntil:
          visible:
            text: "More"
          timeout: 10000
      - tapOn:
          text: "More"
      - extendedWaitUntil:
          visible:
            text: "Mattermost Beta"
          timeout: 10000
      - tapOn:
          text: "Mattermost Beta"

# Share extension opens: tap Channel option to open channel picker
- extendedWaitUntil:
    visible:
      id: "share_extension.channel.option"
    timeout: 15000
- tapOn:
    id: "share_extension.channel.option"

# Select the test channel from the channel list
- extendedWaitUntil:
    visible:
      id: "channel_item.${TEST_CHANNEL_NAME}"
    timeout: 10000
- tapOn:
    id: "channel_item.${TEST_CHANNEL_NAME}"

# Post the shared content
- tapOn:
    id: "share_extension.post.button"

# Return to Mattermost and verify the post appeared in the channel
- launchApp:
    appId: "com.mattermost.rnbeta"
- extendedWaitUntil:
    visible:
      id: "channel.post_list.post"
    timeout: 15000
- assertVisible:
    id: "channel.post_list.post"
