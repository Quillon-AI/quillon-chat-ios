            - generic [ref=e203]:
              - heading "Configure Microsoft Intune Mobile Application Management (MAM)" [level=1] [ref=e204]
              - paragraph [ref=e206]:
                - img "plans-img-yellow" [ref=e207]
                - text: Available on
                - link "Entry, Enterprise, and Enterprise Advanced plans" [ref=e208] [cursor=pointer]:
                  - /url: https://mattermost.com/pricing/
                - text: (not available on Professional)
              - paragraph [ref=e209]: You can configure the Mattermost Mobile App on iOS to enforce Microsoft Intune App Protection Policies (MAM) so organizational data remains protected on Bring Your Own Device (BYOD) and mixed-use devices without requiring device enrollment (MDM).
              - paragraph [ref=e210]: This guide documents the required configuration to enable Intune MAM successfully on iOS.
              - generic [ref=e211]:
                - heading "Read This First" [level=2] [ref=e212]
                - paragraph [ref=e213]:
                  - text: Intune MAM enforcement in Mattermost is identity-based and applies only to the sign-in method selected as the enforced
                  - strong [ref=e214]: Auth Provider
                  - text: in
                  - strong [ref=e215]: System Console > Environment > Mobile Security
                  - text: .
                - list [ref=e216]:
                  - listitem [ref=e217]:
                    - paragraph [ref=e218]:
                      - text: The enforced authentication provider must resolve users using Azure AD
                      - code [ref=e219]: objectId
                      - text: (
                      - code [ref=e220]: IdAttribute = objectId
                      - text: ).
                  - listitem [ref=e221]:
                    - paragraph [ref=e222]:
                      - text: MSAL access tokens must include the
                      - code [ref=e223]: oid
                      - text: claim, and it must match the same Azure AD
                      - code [ref=e224]: objectId
                      - text: "(confirm identity alignment:"
                      - code [ref=e225]: objectId ↔ oid
                      - text: ).
                - generic [ref=e226]:
                  - paragraph [ref=e227]: Important
                  - paragraph [ref=e228]: If Intune MAM enrollment fails due to a technical error, the affected Mattermost server is removed from the mobile app and cached data for that server is wiped from the device.
              - generic [ref=e229]:
                - heading "Unsupported Scenarios" [level=2] [ref=e230]
                - paragraph [ref=e231]: "This guide doesn’t apply when:"
                - list [ref=e232]:
                  - listitem [ref=e233]:
                    - paragraph [ref=e234]: You require Intune MAM on Android devices.
                  - listitem [ref=e235]:
                    - paragraph [ref=e236]: You want Intune MAM enforcement for a sign-in method not backed by Microsoft Entra ID.
                  - listitem [ref=e237]:
                    - paragraph [ref=e238]:
                      - text: The enforced authentication provider cannot resolve users to Azure AD
                      - code [ref=e239]: objectId
                      - text: .
                  - listitem [ref=e240]:
                    - paragraph [ref=e241]: You require a rollout model where users can bypass or defer Intune MAM for the enforced sign-in method.
                - paragraph [ref=e242]: Other authentication methods, such as guest access, may still be enabled separately, but they aren’t evaluated by Intune MAM.
              - generic [ref=e243]:
                - heading "Prerequisites" [level=2] [ref=e244]
                - paragraph [ref=e245]: "Confirm the following before continuing:"
                - list [ref=e246]:
                  - listitem [ref=e247]:
                    - paragraph [ref=e248]: Microsoft Entra ID is used for authentication.
