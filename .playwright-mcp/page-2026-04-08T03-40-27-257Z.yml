                    - paragraph [ref=e250]:
                      - text: You can commit to Azure AD
                      - code [ref=e251]: objectId
                      - text: as the authoritative identity.
                  - listitem [ref=e252]:
                    - paragraph [ref=e253]: Mattermost Enterprise Advanced licensing is available for the server.
                  - listitem [ref=e254]:
                    - paragraph [ref=e255]: Target users are licensed for Microsoft Intune.
                  - listitem [ref=e256]:
                    - paragraph [ref=e257]: You can register applications and grant tenant-wide admin consent in Microsoft Entra.
                  - listitem [ref=e258]:
                    - paragraph [ref=e259]: If enforcing Intune MAM on SAML, users already exist in Mattermost (mobile sign-in does not create users for SAML).
                - generic [ref=e260]:
                  - paragraph [ref=e261]: Note
